# ─────────────────────────────────────────────────────────────────
#  sonar-project.properties — SonarQube Configuration
#  Used in: Session 2 (SonarQube), Session 3 (Jenkins)
# ─────────────────────────────────────────────────────────────────
#
#  Run analysis:
#    mvn sonar:sonar \
#      -Dsonar.host.url=http://<SONAR-IP>:9000 \
#      -Dsonar.login=<YOUR-TOKEN>
# ─────────────────────────────────────────────────────────────────

sonar.projectKey=aarvitex-webapp
sonar.projectName=Aarvitex WebApp
sonar.projectVersion=1.0

# Source and test directories
sonar.sources=src/main/java
sonar.tests=src/test/java

# Compiled class files (Maven produces these in target/classes)
sonar.java.binaries=target/classes

# Language
sonar.language=java
sonar.sourceEncoding=UTF-8

# Exclusions — don't analyze generated or third-party code
sonar.exclusions=**/target/**,**/*.xml
